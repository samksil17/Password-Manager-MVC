<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background-color: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: #1a1d27; border-bottom: 1px solid #2d3148; }
    .navbar-brand { font-weight: 700; color: #7c6af7 !important; letter-spacing: 0.5px; }
    .card { background-color: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; }
    .card-header { background-color: #20243a; border-bottom: 1px solid #2d3148; font-weight: 600; color: #a78bfa; }
    .form-control { background-color: #12141e; border: 1px solid #2d3148; color: #e2e8f0; border-radius: 8px; }
    .form-control:focus { background-color: #12141e; border-color: #7c6af7; color: #e2e8f0; box-shadow: 0 0 0 3px rgba(124,106,247,0.2); }
    .btn-primary { background-color: #7c6af7; border-color: #7c6af7; border-radius: 8px; }
    .btn-primary:hover { background-color: #6655d4; border-color: #6655d4; }
    .btn-outline-secondary { border-color: #4a4f6a; color: #a0aec0; border-radius: 8px; }
    .btn-outline-secondary:hover { background-color: #2d3148; color: #e2e8f0; border-color: #7c6af7; }
    .table { color: #e2e8f0; }
    .table thead th { background-color: #20243a; border-color: #2d3148; color: #a78bfa; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; }
    .table tbody tr { border-color: #2d3148; }
    .table tbody tr:hover { background-color: #20243a; }
    .badge-cat { background-color: #1f2d1e; color: #68d391; border-radius: 6px; padding: 3px 9px; font-size: 0.78rem; }
    .password-cell { font-family: monospace; letter-spacing: 2px; color: #4a4f6a; cursor: pointer; user-select: none; }
    .password-cell.visible { color: #e2e8f0; letter-spacing: normal; }
    .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
    .modal-content { background-color: #1a1d27; border: 1px solid #2d3148; }
    .modal-header, .modal-footer { border-color: #2d3148; }
    .form-label { color: #a0aec0; font-size: 0.85rem; }
    .empty-state { padding: 3rem; text-align: center; color: #4a4f6a; }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3 d-flex justify-content-between">
  <span class="navbar-brand fs-5"><i class="bi bi-shield-lock-fill me-2"></i>Password Manager</span>
  <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#credentialModal" onclick="openAddModal()">
    <i class="bi bi-plus-lg me-1"></i> Nueva credencial
  </button>
</nav>

<div class="container py-4">

  <!-- Buscador -->
  <div class="mb-4">
    <div class="input-group">
      <span class="input-group-text" style="background:#1a1d27; border-color:#2d3148; color:#7c6af7;">
        <i class="bi bi-search"></i>
      </span>
      <input type="text" id="searchInput" class="form-control" placeholder="Buscar por sitio, usuario o categoría..." oninput="filterTable()"/>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-key-fill me-2"></i>Credenciales guardadas</span>
      <span id="countBadge" class="badge bg-secondary">0</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Sitio</th>
              <th>Usuario</th>
              <th>Contraseña</th>
              <th>Categoría</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="credentialsBody">
            <tr><td colspan="6"><div class="empty-state"><i class="bi bi-database-slash"></i>Cargando...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal agregar/editar -->
<div class="modal fade" id="credentialModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-light" id="modalTitle">Nueva credencial</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId"/>
        <div class="mb-3">
          <label class="form-label">Sitio *</label>
          <input type="text" id="inputSitio" class="form-control" placeholder="Ej: Gmail, Netflix, GitHub"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Usuario *</label>
          <input type="text" id="inputUsuario" class="form-control" placeholder="correo@ejemplo.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña *</label>
          <div class="input-group">
            <input type="password" id="inputPassword" class="form-control" placeholder="••••••••"/>
            <button class="btn btn-outline-secondary" type="button" onclick="toggleModalPassword()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Categoría</label>
          <input type="text" id="inputCategoria" class="form-control" placeholder="Ej: Trabajo, Personal, Redes sociales"/>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="saveCredential()">
          <i class="bi bi-save me-1"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Cambiar por la URL de Render después de desplegar
  const API_URL = 'https://password-manager-mvc.onrender.com';

  let allCredentials = [];

  // CARGAR 
  async function loadCredentials() {
    try {
      const res = await fetch(`${API_URL}/credentials`);
      allCredentials = await res.json();
      renderTable(allCredentials);
    } catch {
      showToast('Error al conectar con la API', 'danger');
      document.getElementById('credentialsBody').innerHTML =
        `<tr><td colspan="6"><div class="empty-state"><i class="bi bi-wifi-off"></i>No se pudo conectar con el servidor</div></td></tr>`;
    }
  }

  // RENDERIZAR
  function renderTable(data) {
    document.getElementById('countBadge').textContent = data.length;
    const tbody = document.getElementById('credentialsBody');

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="bi bi-key"></i>No hay credenciales. ¡Agrega una!</div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(c => `
      <tr>
        <td class="text-secondary">${c.id}</td>
        <td><strong>${c.sitio}</strong></td>
        <td>${c.usuario}</td>
        <td>
          <span class="password-cell" id="pw-${c.id}" onclick="togglePassword(${c.id}, '${escapeJs(c.password)}')">
            ••••••••
          </span>
        </td>
        <td>
          ${c.categoria ? `<span class="badge-cat">${c.categoria}</span>` : '<span class="text-secondary">—</span>'}
        </td>
        <td>
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditModal(${c.id})" title="Editar">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteCredential(${c.id})" title="Eliminar">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  // FILTRAR 
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allCredentials.filter(c =>
      c.sitio.toLowerCase().includes(q) ||
      c.usuario.toLowerCase().includes(q) ||
      (c.categoria || '').toLowerCase().includes(q)
    ));
  }

  // TOGGLE CONTRASEÑA EN TABLA
  function togglePassword(id, pw) {
    const el = document.getElementById(`pw-${id}`);
    if (el.classList.contains('visible')) {
      el.textContent = '••••••••';
      el.classList.remove('visible');
    } else {
      el.textContent = pw;
      el.classList.add('visible');
    }
  }

  // MODAL AGREGAR
  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Nueva credencial';
    document.getElementById('editId').value = '';
    ['inputSitio','inputUsuario','inputPassword','inputCategoria'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  // MODAL EDITAR
  function openEditModal(id) {
    const c = allCredentials.find(c => c.id === id);
    if (!c) return;
    document.getElementById('modalTitle').textContent = 'Editar credencial';
    document.getElementById('editId').value = c.id;
    document.getElementById('inputSitio').value = c.sitio;
    document.getElementById('inputUsuario').value = c.usuario;
    document.getElementById('inputPassword').value = c.password;
    document.getElementById('inputCategoria').value = c.categoria || '';
    new bootstrap.Modal(document.getElementById('credentialModal')).show();
  }

  // guardar (crear o actualizar) 
  async function saveCredential() {
    const id       = document.getElementById('editId').value;
    const sitio    = document.getElementById('inputSitio').value.trim();
    const usuario  = document.getElementById('inputUsuario').value.trim();
    const password = document.getElementById('inputPassword').value.trim();
    const categoria = document.getElementById('inputCategoria').value.trim();

    if (!sitio || !usuario || !password) {
      showToast('Sitio, usuario y contraseña son obligatorios', 'warning');
      return;
    }

    const isEdit = !!id;
    const endpoint = isEdit ? `${API_URL}/credentials/${id}` : `${API_URL}/credentials`;

    try {
      const res = await fetch(endpoint, {
        method: isEdit ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sitio, usuario, password, categoria })
      });
      if (!res.ok) throw new Error();
      bootstrap.Modal.getInstance(document.getElementById('credentialModal')).hide();
      showToast(isEdit ? 'Credencial actualizada ✓' : 'Credencial guardada ✓', 'success');
      loadCredentials();
    } catch {
      showToast('Error al guardar', 'danger');
    }
  }

  //  ELIMINAR 
  async function deleteCredential(id) {
    if (!confirm('¿Seguro que querés eliminar esta credencial?')) return;
    try {
      await fetch(`${API_URL}/credentials/${id}`, { method: 'DELETE' });
      showToast('Credencial eliminada', 'success');
      loadCredentials();
    } catch {
      showToast('Error al eliminar', 'danger');
    }
  }

  //  TOGGLE CONTRASEÑA EN MODAL 
  function toggleModalPassword() {
    const input = document.getElementById('inputPassword');
    const icon  = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  }

  //  TOAST 
  function showToast(msg, type = 'success') {
    const toastEl = document.getElementById('toast');
    const colors = { success: '#198754', danger: '#dc3545', warning: '#856404' };
    toastEl.style.backgroundColor = colors[type] || colors.success;
    document.getElementById('toastMessage').textContent = msg;
    new bootstrap.Toast(toastEl, { delay: 3000 }).show();
  }

  function escapeJs(str) {
    return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  //  INICIO 
  loadCredentials();
</script>
</body>
</html>
